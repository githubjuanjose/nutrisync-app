name: EAS Update (OTA)

# Push to main → publish a new JS bundle over-the-air.
# Installed builds pull it automatically on next launch — no re-install, no store.
on:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}   # set this secret in the repo (see PIPELINE.md)

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Publish OTA update
        run: eas update --branch production --message "${{ github.event.head_commit.message }}" --non-interactive
